<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>World Cup Predictor</title>
  <link rel="stylesheet" href="/assets/styles.css">
</head>
<body>
  <header>
    <h1>World Cup Predictor</h1>
    <p>Predict the full round before the first game of that round kicks off. Correct winner/draw = 3 points. Exact score bonus = +2.</p>
  </header>

  <main class="wrap">
    <section class="card">
      <h2>Make predictions</h2>

      <div class="row">
        <input id="nickname" placeholder="Your nickname">
      </div>

      <div class="tabs" id="roundTabs"></div>
      <div id="matches"></div>

      <div class="action-bar">
        <button id="loadBtn" class="secondary">Load my saved picks</button>
        <button id="submitBtn">Lock in picks</button>
      </div>

      <p class="small" id="status"></p>
    </section>
  </main>

  <script type="module" src="/assets/app.js"></script>
</body>
</html>

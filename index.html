<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>World Cup Predictor</title>
  <link rel="stylesheet" href="/assets/styles.css">
  <link rel="stylesheet" href="/assets/live-badges.css">
  <link rel="stylesheet" href="/assets/live-logic.css">
  <link rel="stylesheet" href="/assets/bonus.css">
  <link rel="stylesheet" href="/assets/past-rounds.css">
</head>
<body>
  <main class="wrap">
    <section id="welcomeScreen" class="welcome-screen">
      <div class="welcome-card">
        <div class="welcome-logo">Kaifan WC</div>
        <h1>World Cup Predictor</h1>
        <p class="welcome-copy">Enter your name to start predicting and climb the leaderboard.</p>
        <input id="welcomeName" placeholder="Your name" autocomplete="name">
        <button id="continueBtn">Continue</button>
        <p class="welcome-note">Once you lock in picks, your name and picks are final for that round.</p>
        <p class="small" id="welcomeStatus"></p>
      </div>
    </section>
    <section id="appScreen" class="card app-hidden">
      <header class="app-header">
        <div>
          <p class="welcome-kicker">KAIFAN WC</p>
          <h1>World Cup Predictor</h1>
          <p id="playerLabel" class="player-label"></p>
        </div>
        <button id="changeNameBtn" class="secondary change-name-btn">Change name</button>
      </header>
      <div class="tabs" id="roundTabs"></div>
      <div id="matches"></div>
      <div class="action-bar"><button id="submitBtn">Lock in picks</button></div>
      <p class="small" id="status"></p>
    </section>
  </main>
  <script type="module" src="/assets/app.js"></script>
  <script src="/assets/continue-rescue.js?v=1"></script>
  <script src="/assets/live-logic.js"></script>
  <script src="/assets/live-simultaneous.js?v=1"></script>
  <script src="/assets/knockout-live-window.js"></script>
  <script src="/assets/name-claim.js"></script>
  <script src="/assets/pick-helper.js"></script>
  <script src="/assets/bonus.js"></script>
</body>
</html>

<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin - World Cup Predictor</title><link rel="stylesheet" href="/assets/styles.css"></head><body><header><h1>Admin Panel</h1><p>Add future games, enter results, and keep the leaderboard alive.</p></header><main class="wrap grid"><section class="card"><h2>Add / update match</h2><input id="adminPass" type="password" placeholder="Admin password"><div class="row"><input id="id" placeholder="Match ID, optional"><input id="round" placeholder="Round e.g. Round of 32"></div><div class="row"><input id="group" placeholder="Group/stage optional"><input id="kickoff" type="datetime-local"></div><div class="row"><input id="home" placeholder="Home team"><input id="away" placeholder="Away team"></div><button id="saveMatch">Save match</button><p class="small" id="adminStatus"></p><hr style="border-color:#22324d"><h2>Matches & results</h2><div id="adminMatches"></div></section><aside class="card leaderboard"><h2>Leaderboard</h2><div id="leaderboard"></div><p class="small">Keep this page private. The admin password is checked by Netlify Functions.</p></aside></main><script type="module" src="/assets/admin.js"></script></body></html>
